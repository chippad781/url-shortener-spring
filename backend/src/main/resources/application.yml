spring:
  application:
    name: url-shortener

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/linksnip}
    username: ${DATABASE_USER:linksnip}
    password: ${DATABASE_PASSWORD:linksnip}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate        # schema is owned by Flyway, never by Hibernate
    open-in-view: false          # avoid lazy-loading on the render thread
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms

# Actuator: expose only health, and only the liveness/readiness detail we want
management:
  endpoints:
    web:
      base-path: /api/v1
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework   # respect X-Forwarded-* behind Render/NGINX

app:
  base-url: ${BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    # Base64-encoded 256-bit secret. Override in every real environment.
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMzJieXRlcyE=}
    access-ttl-minutes: 15
    refresh-ttl-days: 7
  shortcode:
    length: 7
    max-retries: 5
  ratelimit:
    url-create-per-hour: 20
    redirect-per-minute: 200
    login-per-minute: 10

logging:
  level:
    com.linksnip: INFO
